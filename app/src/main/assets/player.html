<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <style>
        html,body,#player{width:100%;height:100%;margin:0;background:#08090f;overflow:hidden}
    </style>
</head>
<body>
<div id="player"></div>
<script>
    const params = new URLSearchParams(location.search);
    const videoId = params.get('videoId') || '';
    let player;
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            width: '100%', height: '100%', videoId,
            playerVars: {
                autoplay: 1, controls: 1, playsinline: 1, rel: 0,
                origin: 'https://appassets.androidplatform.net'
            },
            events: {
                onStateChange: event => {
                    if (event.data === YT.PlayerState.ENDED && window.PlayerBridge) {
                        window.PlayerBridge.onEnded();
                    }
                },
                onError: event => window.PlayerBridge && window.PlayerBridge.onError(String(event.data))
            }
        });
    }
    function pausePlayback(){ if(player && player.pauseVideo) player.pauseVideo(); }
    function playPlayback(){ if(player && player.playVideo) player.playVideo(); }
</script>
</body>
</html>
